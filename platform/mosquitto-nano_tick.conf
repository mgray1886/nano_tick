# nano_tick broker config for the rpi4B.
# Installed by platform/setup.sh into /etc/mosquitto/conf.d/
# Binds only to the private point-to-point link (non-routed), so anonymous
# access exposes nothing beyond the two Pis.
listener 1883 192.168.100.2
allow_anonymous true
persistence true
max_queued_messages 100000
