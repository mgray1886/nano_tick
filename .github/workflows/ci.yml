name: CI

on:
  push:
  workflow_dispatch:

# A newer push to the same branch supersedes any run still in progress.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            ingest/requirements.txt
      - run: pip install -r requirements-dev.txt
      - name: flake8
        run: flake8
      - name: Shell script syntax
        run: |
          for script in ingest/setup.sh platform/setup.sh; do
            bash -n "$script"
          done

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.13 = production (Raspberry Pi OS Lite/Trixie, and the docker image);
        # 3.14 = upgrade canary for the next OS bump
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            ingest/requirements.txt
      - run: pip install -r requirements-dev.txt
      - name: Unit tests
        run: pytest

  docker-build:
    # Catches Dockerfile/compose drift (e.g. a renamed folder no longer copied)
    # without needing network access to Binance.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build compose images
        run: docker compose build
